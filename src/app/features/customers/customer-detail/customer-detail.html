<div class="h-full max-h-screen flex flex-col gap-4 p-4 md:p-5 animate-in fade-in slide-in-from-bottom-4 duration-500 max-w-[1600px] mx-auto overflow-hidden">
  
  <!-- Bento: Header Section (Fixed Height) -->
  <div class="shrink-0">
    @if (customerResource.isLoading() && !customer()) {
      <div class="h-20 bg-gray-900/40 rounded-3xl animate-pulse border border-white/5"></div>
    } @else {
      <app-customer-identity 
        [name]="customer()?.name ?? 'Cargando...'"
        [email]="customer()?.email ?? '...'"
        [points]="customer()?.points ?? 0" />
    }
  </div>

  <!-- Bento: Main Grid (Fills remaining space and prevents global scroll) -->
  <div class="grid grid-cols-1 lg:grid-cols-12 gap-3.5 items-stretch flex-1 min-h-0">
    
    <!-- Columna Operativa (8/12 on LG) -->
    <div class="lg:col-span-7 xl:col-span-8 flex flex-col gap-3.5 h-full min-h-0">
      <div class="flex-none">
        <app-active-membership 
          [membership]="activeMembership()"
          [loading]="customerResource.isLoading()"
          [actionLoading]="loading()"
          (remove)="onRemoveMembership()" />
      </div>
      
      <!-- Back Link (Desktop only) -->
      <div class="mt-auto hidden lg:block pb-2">
        <button routerLink="/app/clientes" class="flex items-center gap-3 text-gray-500 hover:text-app-accent transition-all text-[10px] font-black uppercase tracking-[0.2em] group">
          <div class="w-7 h-7 rounded-full border border-gray-800 flex items-center justify-center group-hover:border-app-accent group-hover:bg-app-accent/5 transition-all">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg>
          </div>
          Volver al Directorio
        </button>
      </div>
    </div>

    <!-- Columna de Acción (4/12 on LG) -->
    <div class="lg:col-span-5 xl:col-span-4 h-full flex flex-col min-h-0">
      <app-plan-selector 
        class="flex-1 min-h-0"
        [plans]="memberships()"
        [activeId]="selectedMembershipId()"
        [loading]="membershipsResource.isLoading()"
        [actionLoading]="loading()"
        (select)="onAssignMembership($event)" />

      <!-- Back Link (Mobile only) -->
      <div class="lg:hidden mt-4 shrink-0">
        <button routerLink="/app/clientes" class="w-full py-4 text-gray-500 hover:text-white transition-colors text-[10px] font-black uppercase tracking-[0.3em] flex items-center justify-center gap-3 border border-dashed border-gray-800 rounded-2xl">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
          </svg>
          Volver al Directorio
        </button>
      </div>
    </div>

  </div>

</div>
