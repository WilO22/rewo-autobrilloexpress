<div class="h-screen w-full flex items-center justify-center bg-navy bg-[image:var(--background-image-glass)] relative overflow-hidden">
  
  <!-- Elementos de fondo borrosos (Glassmorphism blobs) -->
  <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-app-accent/20 rounded-full blur-[100px]"></div>
  <div class="absolute bottom-[-10%] right-[-10%] w-[30rem] h-[30rem] bg-app-secondary/20 rounded-full blur-[120px] transition-colors duration-1000"></div>

  <div class="z-10 w-full max-w-md p-8 bg-white/5 backdrop-blur-xl border border-white/10 rounded-3xl shadow-2xl mx-4">
    
    <div class="text-center mb-8">
      <div class="w-16 h-16 mx-auto bg-app-accent/10 rounded-2xl border border-app-accent/30 flex items-center justify-center mb-4 shadow-[0_0_20px_var(--app-glow)]">
        <svg class="w-8 h-8 text-app-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
      </div>
      <h2 class="text-3xl font-extrabold text-white tracking-tight">AutoBrillo<span class="text-app-accent">Express</span></h2>
      <p class="text-gray-400 mt-2 text-sm">ERP Multi-sede Industrial</p>
    </div>

    <form (submit)="handleLogin($event)" class="space-y-5">
      <div>
        <label for="email" class="block text-sm font-medium text-gray-300 mb-1">Correo Autorizado</label>
        <input type="email" id="email" name="email" required
          class="w-full bg-navy/50 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-app-accent focus:ring-1 focus:ring-app-accent transition-all">
      </div>
      
      <div>
        <label for="password" class="block text-sm font-medium text-gray-300 mb-1">Contraseña Segura</label>
        <input type="password" id="password" name="password" required
          class="w-full bg-navy/50 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-app-accent focus:ring-1 focus:ring-app-accent transition-all">
      </div>

      <button type="submit"
        class="w-full bg-app-accent text-navy font-bold py-3 px-4 rounded-xl shadow-[0_0_15px_var(--app-glow)] hover:brightness-110 transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-navy focus:ring-app-accent mt-6 cursor-pointer">
        Ingresar al Sistema
      </button>
    </form>
  </div>
</div>
