<div class="flex flex-col h-screen bg-navy bg-[image:var(--background-image-glass)] bg-fixed overflow-hidden">
  
  <!-- Encabezado/Topbar (Ej. Logo y Selector de Sucursal) -->
  <header class="h-16 flex items-center justify-between px-4 bg-navy/80 backdrop-blur-md border-b border-cian/20 z-50">
    <div class="flex items-center gap-2">
      <div class="w-8 h-8 rounded-full bg-cyan-400 flex items-center justify-center text-navy font-bold shadow-[0_0_15px_rgba(34,211,238,0.5)]">
        A
      </div>
      <h1 class="text-xl font-bold tracking-tight text-white drop-shadow-md">AutoBrillo<span class="text-cian">Express</span></h1>
    </div>
    
    <!-- Selector de sucursal dinámico -->
    <div class="flex items-center gap-3 relative" *ngIf="branchService.branches().length > 0">
      <div *ngIf="authService.profile() as profile" class="hidden sm:flex flex-col items-end mr-1">
        <span class="text-xs text-gray-400 font-medium tracking-wider uppercase">
          {{ authService.userRole() === 'SUPER_ADMIN' ? 'Super Admin' : (authService.userRole() === 'MANAGER' ? 'Gerente' : 'Operador') }}
        </span>
        <span class="text-sm text-white font-semibold">{{ profile.name }}</span>
      </div>

      <div class="relative">
        <button 
          (click)="toggleDropdown()"
          [disabled]="authService.userRole() === 'MANAGER'"
          class="flex items-center gap-2 px-3 py-1.5 rounded-lg bg-white/5 border border-white/10 text-sm enabled:hover:bg-white/10 transition-colors enabled:cursor-pointer disabled:opacity-50 group"
        >
          <span class="font-medium text-gray-200 enabled:group-hover:text-cian transition-colors">
            {{ getBranchName(branchService.activeBranchId()) }}
          </span>
          <svg class="w-4 h-4 text-cian transition-transform" [class.rotate-180]="isDropdownOpen()" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
        </button>

        <!-- Dropdown Menu -->
        <div *ngIf="isDropdownOpen()" 
             class="absolute right-0 mt-2 w-48 bg-navy/95 backdrop-blur-xl border border-white/10 rounded-xl shadow-2xl z-[100] overflow-hidden animate-in fade-in zoom-in duration-200"
        >
          <div class="py-1">
            <!-- Opción Global para CEO -->
            <button 
              *ngIf="authService.userRole() === 'SUPER_ADMIN'"
              (click)="selectBranch(null)"
              class="w-full text-left px-4 py-2.5 text-sm transition-colors hover:bg-white/5 active:bg-white/10 border-b border-white/5"
              [class.text-cian]="!branchService.activeBranchId()"
              [class.text-gray-300]="branchService.activeBranchId()"
            >
              <div class="flex items-center justify-between font-bold">
                <span>Todas las Sedes</span>
                <svg *ngIf="!branchService.activeBranchId()" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
              </div>
            </button>

            <button 
              *ngFor="let b of branchService.branches()"
              (click)="selectBranch(b.id)"
              class="w-full text-left px-4 py-2.5 text-sm transition-colors hover:bg-white/5 active:bg-white/10"
              [class.text-cian]="b.id === branchService.activeBranchId()"
              [class.text-gray-300]="b.id !== branchService.activeBranchId()"
            >
              <div class="flex items-center justify-between">
                <span>{{ b.name }}</span>
                <svg *ngIf="b.id === branchService.activeBranchId()" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
              </div>
            </button>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- Área principal de contenido -->
  <div class="flex-1 flex overflow-hidden">
    <!-- Sidebar Desktop (hidden on mobile) -->
    <aside class="hidden md:flex flex-col w-64 h-full bg-navy/90 backdrop-blur-lg border-r border-cian/20 p-4">
        <nav class="space-y-4 pt-4">
          <a routerLink="/app/agenda" routerLinkActive="bg-cian/10 text-cian border-cian/30 shadow-[0_0_15px_rgba(34,211,238,0.1)]" [routerLinkActiveOptions]="{exact: false}" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-300 hover:bg-white/5 hover:text-white transition-all cursor-pointer border border-transparent">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
            Agenda de Órdenes
          </a>
          <a routerLink="/app/inventario" routerLinkActive="bg-cian/10 text-cian border-cian/30 shadow-[0_0_15px_rgba(34,211,238,0.1)]" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-300 hover:bg-white/5 hover:text-white transition-all cursor-pointer border border-transparent">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
            Inventario & Stock
          </a>
          <a routerLink="/app/clientes" routerLinkActive="bg-cian/10 text-cian border-cian/30 shadow-[0_0_15px_rgba(34,211,238,0.1)]" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-300 hover:bg-white/5 hover:text-white transition-all cursor-pointer border border-transparent">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
            Clientes
          </a>
          <a *ngIf="authService.userRole() === 'SUPER_ADMIN'" 
             routerLink="/app/marketing" routerLinkActive="bg-cian/10 text-cian border-cian/30 shadow-[0_0_15px_rgba(34,211,238,0.1)]"
             class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-300 hover:bg-white/5 hover:text-white transition-all cursor-pointer border border-transparent"
          >
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z"></path></svg>
            Marketing (Promo)
          </a>
          <a *ngIf="authService.userRole() === 'SUPER_ADMIN'" 
             routerLink="/app/sedes" routerLinkActive="bg-cian/10 text-cian border-cian/30 shadow-[0_0_15px_rgba(34,211,238,0.1)]"
             class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-300 hover:bg-white/5 hover:text-white transition-all cursor-pointer border border-transparent"
          >
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>
            Sedes
          </a>
          <a *ngIf="authService.userRole() === 'SUPER_ADMIN'" 
             routerLink="/app/equipo" routerLinkActive="bg-cian/10 text-cian border-cian/30 shadow-[0_0_15px_rgba(34,211,238,0.1)]"
             class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-300 hover:bg-white/5 hover:text-white transition-all cursor-pointer border border-transparent"
          >
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
            Equipo
          </a>
          <a *ngIf="authService.userRole() === 'SUPER_ADMIN'" 
             routerLink="/app/reportes" routerLinkActive="bg-cian/10 text-cian border-cian/30 shadow-[0_0_15px_rgba(34,211,238,0.1)]"
             class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-300 hover:bg-white/5 hover:text-white transition-all cursor-pointer border border-transparent"
          >
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
            Reportes (KPIs)
          </a>
        </nav>

        <div class="mt-auto pt-4 border-t border-cian/10">
          <button 
            (click)="logout()"
            class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-red-500/10 hover:text-red-400 transition-all cursor-pointer group"
          >
            <svg class="w-5 h-5 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
            Cerrar Sesión
          </button>
        </div>
    </aside>

    <main class="flex-1 overflow-y-auto w-full max-w-7xl mx-auto pb-20 md:pb-0">
      <div class="p-4 md:p-6 lg:p-8">
        <router-outlet></router-outlet>
      </div>
    </main>
  </div>

  <app-bottom-nav></app-bottom-nav>

</div>
